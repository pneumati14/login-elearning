; ─────────────────────────────────────────────────────────────────────
; Raised PHP limits so administrators can upload course media.
; Mounted into the backend container's php conf.d (see
; docker-compose.override.yml). Loaded last (zz- prefix) so it wins.
; ─────────────────────────────────────────────────────────────────────
upload_max_filesize = 512M
post_max_size = 520M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
