# ─────────────────────────────────────────────────────────────────────
# Production overlay
#
#   docker compose \
#     -f docker-compose.yml \
#     -f production/docker-compose.production.yml \
#     --env-file production/.env \
#     up -d --build
#
# Because no -f flag points at docker-compose.override.yml, the dev
# overrides are NOT applied here: application code is baked into the
# images (no bind mounts) and the database port is not published.
# ─────────────────────────────────────────────────────────────────────

services:

  database:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  backend:
    restart: always
    environment:
      APP_ENV: prod
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  frontend:
    build:
      target: prod
    restart: always
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  caddy:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
