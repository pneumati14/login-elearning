# ─────────────────────────────────────────────────────────────────────
# login — e-learning platform · base service definitions
#
#   Local dev   docker compose up -d --build
#               (docker-compose.override.yml is merged in automatically)
#
#   Staging     docker compose -f docker-compose.yml \
#                              -f staging/docker-compose.staging.yml \
#                              --env-file staging/.env up -d --build
#
#   Production  docker compose -f docker-compose.yml \
#                              -f production/docker-compose.production.yml \
#                              --env-file production/.env up -d --build
#
# This file holds production-safe defaults. Development conveniences live
# in docker-compose.override.yml; environment-specific tweaks live in the
# staging/ and production/ overlay files.
# ─────────────────────────────────────────────────────────────────────

name: ${COMPOSE_PROJECT_NAME:-login-elearning}

services:

  # ── PostgreSQL database ────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-elearning}"
      POSTGRES_USER: "${POSTGRES_USER:-elearning}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elearning} -d ${POSTGRES_DB:-elearning}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - elearning

  # ── Symfony backend (placeholder) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: "${APP_ENV:-prod}"
      APP_SECRET: "${APP_SECRET:?Set APP_SECRET in your .env file}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-elearning}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-elearning}?serverVersion=16&charset=utf8"
    volumes:
      # Persistent upload storage. Overridable per environment via
      # STORAGE_DIR so staging and production keep separate files.
      - ${STORAGE_DIR:-./storage}:/var/www/html/var/storage
    networks:
      - elearning

  # ── Vue.js frontend (placeholder) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      VITE_API_URL: "${VITE_API_URL:-/api}"
    networks:
      - elearning

  # ── Caddy reverse proxy (placeholder) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SITE_ADDRESS: "${SITE_ADDRESS:-localhost}"
      DEFAULT_SNI: "${DEFAULT_SNI:-localhost}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
      REDIRECT_FROM: "${REDIRECT_FROM:-redirect.localhost}"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Symfony public/ — read-only; lets Caddy resolve paths for php_fastcgi.
      - ./backend/public:/var/www/html/public:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - elearning

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  elearning:
    driver: bridge
